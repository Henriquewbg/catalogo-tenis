<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vault</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;color:#fff}
.app{background:#111;max-width:390px;margin:0 auto;min-height:100vh}

.topbar{background:#1a1a1a;padding:20px 18px 0;border-bottom:0.5px solid rgba(255,255,255,0.08);position:sticky;top:0;z-index:10}
.topbar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.logo{font-size:13px;font-weight:500;letter-spacing:5px;color:#fff}
.ib{width:38px;height:38px;border-radius:50%;border:0.5px solid rgba(255,255,255,0.2);background:transparent;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;flex-shrink:0}
.ib:hover{background:rgba(255,255,255,0.08)}
.ib svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.srch{position:relative;margin-bottom:14px}
.srch input{width:100%;padding:11px 16px 11px 40px;border-radius:100px;border:0.5px solid rgba(255,255,255,0.1);background:#2a2a2a;font-size:14px;color:#fff}
.srch input::placeholder{color:#666}
.srch svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);width:16px;height:16px;stroke:#666;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}

.nav-tabs{display:flex}
.nav-tab{flex:1;padding:12px 8px;font-size:13px;font-weight:500;text-align:center;cursor:pointer;color:#666;border-bottom:2px solid transparent;background:transparent;border-left:none;border-right:none;border-top:none}
.nav-tab.on{color:#fff;border-bottom-color:#fff}

.pills{display:flex;gap:6px;padding:12px 14px 0;overflow-x:auto;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{padding:7px 16px;border-radius:100px;font-size:12px;font-weight:500;white-space:nowrap;cursor:pointer;border:0.5px solid rgba(255,255,255,0.2);color:#aaa;background:transparent}
.pill.on{background:#fff;color:#111;border-color:transparent}

.portfolio{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px}
.pcard{background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:14px}
.pcard .val{font-size:18px;font-weight:500;color:#fff;margin-top:2px}
.pcard .lbl{font-size:9px;letter-spacing:2px;color:#666;font-weight:500}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px 24px}
.scard{background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;overflow:hidden;cursor:pointer}
.scard:hover{border-color:rgba(255,255,255,0.25)}
.scard-img{height:110px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden}
.scard-img img{width:100%;height:100%;object-fit:cover}
.scard-body{padding:10px 12px 12px}
.scard-brand{font-size:9px;letter-spacing:2.5px;color:#666;font-weight:500;margin-bottom:3px}
.scard-name{font-size:13px;font-weight:500;color:#fff;line-height:1.3;margin-bottom:8px;min-height:34px}
.price-row{display:flex;justify-content:space-between;align-items:flex-end}
.price-paid{font-size:10px;color:#666}
.price-sell{font-size:13px;font-weight:500}
.price-sell.none{color:#555;font-size:11px;font-weight:400}
.price-sell.profit{color:#4ade80}
.price-sell.loss{color:#f87171}

.empty{text-align:center;padding:48px 24px;color:#555;font-size:14px;grid-column:span 2}
.add-btn{margin:0 14px 24px;border-radius:16px;background:#fff;color:#111;border:none;padding:15px;font-size:14px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;width:calc(100% - 28px)}
.add-btn:hover{opacity:0.87}

.sales-section{padding:14px}
.sec-title{font-size:9px;letter-spacing:2px;color:#666;font-weight:500;margin-bottom:12px}
.chart-wrap{background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px;margin-bottom:14px}
.chart-area{position:relative;height:180px;margin-top:8px}

.sale-row{background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.08);border-radius:14px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;cursor:pointer}
.sale-row:hover{border-color:rgba(255,255,255,0.2)}
.sale-ico{width:48px;height:48px;border-radius:10px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;overflow:hidden}
.sale-ico img{width:100%;height:100%;object-fit:cover}
.sale-info{flex:1;min-width:0}
.sale-brand{font-size:9px;letter-spacing:2px;color:#666;font-weight:500}
.sale-name{font-size:14px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sale-date{font-size:11px;color:#555;margin-top:2px}
.sale-right{text-align:right;flex-shrink:0}
.sale-profit{font-size:15px;font-weight:500}
.sale-profit.pos{color:#4ade80}
.sale-profit.neg{color:#f87171}
.sale-profit.zero{color:#aaa}
.sale-sub{font-size:10px;color:#555}
.no-sales{text-align:center;padding:40px 20px;color:#555;font-size:14px;background:#1a1a1a;border-radius:16px;border:0.5px solid rgba(255,255,255,0.08)}

.modal-wrap{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;z-index:100}
.sheet{background:#1a1a1a;border-radius:24px 24px 0 0;padding:10px 20px 32px;width:100%;max-height:92vh;overflow-y:auto}
.drag{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.15);margin:0 auto 22px}
.sh-title{font-size:18px;font-weight:500;color:#fff;margin-bottom:20px}
.fl{display:flex;flex-direction:column;gap:12px}
.fg label{font-size:9px;letter-spacing:2px;color:#888;display:block;margin-bottom:6px;font-weight:500}
.fg input,.fg select,.fg textarea{width:100%;padding:13px 14px;border-radius:12px;border:0.5px solid rgba(255,255,255,0.15);background:#2a2a2a;font-size:15px;color:#fff;font-family:inherit}
.fg input::placeholder,.fg textarea::placeholder{color:#555}
.fg textarea{resize:none;height:72px;line-height:1.5}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.divider{height:0.5px;background:rgba(255,255,255,0.08);margin:4px 0}

.img-picker{width:100%;height:100px;border-radius:12px;border:0.5px dashed rgba(255,255,255,0.2);background:#2a2a2a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;overflow:hidden;position:relative}
.img-picker img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.img-picker-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:rgba(0,0,0,0.5);border-radius:12px}
.img-picker-overlay svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.img-picker-overlay span{font-size:11px;color:#fff;letter-spacing:1px;font-weight:500}
.img-picker-empty svg{width:22px;height:22px;stroke:#555;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.img-picker-empty span{font-size:11px;color:#555;letter-spacing:1px;font-weight:500}

.sold-toggle{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.toggle-track{width:44px;height:26px;border-radius:100px;border:0.5px solid rgba(255,255,255,0.2);background:#2a2a2a;position:relative;cursor:pointer;flex-shrink:0}
.toggle-track.on{background:#fff;border-color:#fff}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:#888;position:absolute;top:2px;left:2px;transition:transform 0.15s}
.toggle-track.on .toggle-thumb{background:#111;transform:translateX(18px)}
.toggle-lbl{font-size:14px;color:#fff}

.btn-save{width:100%;padding:15px;border-radius:12px;background:#fff;color:#111;border:none;font-size:15px;font-weight:500;cursor:pointer;margin-top:6px}
.btn-save:hover{opacity:0.87}
.btn-cancel{width:100%;padding:15px;border-radius:12px;background:#2a2a2a;color:#aaa;border:0.5px solid rgba(255,255,255,0.15);font-size:15px;cursor:pointer}
.btn-del{width:100%;padding:13px;border-radius:12px;background:rgba(220,38,38,0.15);color:#f87171;border:none;font-size:14px;cursor:pointer;margin-top:4px}

.det-wrap{position:fixed;inset:0;background:#111;z-index:100;overflow-y:auto}
.det-hero{height:220px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:80px;position:relative;overflow:hidden}
.det-hero img{width:100%;height:100%;object-fit:cover}
.det-back,.det-edit{position:absolute;top:16px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,0.6);border:0.5px solid rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
.det-back{left:16px}
.det-edit{right:16px}
.det-back svg,.det-edit svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.det-body{padding:20px}
.det-brand{font-size:10px;letter-spacing:3px;color:#666;font-weight:500}
.det-name{font-size:22px;font-weight:500;color:#fff;margin:6px 0 18px;line-height:1.2}
.det-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.det-block{background:#1a1a1a;border-radius:12px;padding:14px;border:0.5px solid rgba(255,255,255,0.06)}
.det-block .lbl{font-size:9px;letter-spacing:2px;color:#555;font-weight:500}
.det-block .v{font-size:16px;font-weight:500;color:#fff;margin-top:4px}
.det-block .v.green{color:#4ade80}
.det-block .v.red{color:#f87171}
.det-block .v.muted{font-weight:400;color:#555;font-size:13px}

.profit-card{border-radius:12px;padding:14px;margin-bottom:14px;background:#1a1a1a;border:0.5px solid rgba(255,255,255,0.06)}
.profit-card .lbl{font-size:9px;letter-spacing:2px;color:#555;font-weight:500;margin-bottom:6px}
.profit-row{display:flex;align-items:baseline;gap:8px}
.profit-num{font-size:24px;font-weight:500}
.profit-num.pos{color:#4ade80}
.profit-num.neg{color:#f87171}
.profit-num.zero{color:#aaa}
.profit-pct{font-size:13px;color:#666}

.det-notes{background:#1a1a1a;border-radius:12px;padding:14px;margin-bottom:14px;border:0.5px solid rgba(255,255,255,0.06)}
.det-notes .lbl{font-size:9px;letter-spacing:2px;color:#555;font-weight:500;margin-bottom:6px}
.det-notes .txt{font-size:14px;color:#aaa;line-height:1.6}
.sold-badge{font-size:9px;letter-spacing:1.5px;font-weight:500;padding:3px 8px;border-radius:100px;background:rgba(74,222,128,0.15);color:#4ade80;display:inline-block;margin-bottom:6px}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="topbar-head">
      <span class="logo">VAULT</span>
      <button class="ib" onclick="showAdd()" aria-label="Adicionar par">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div class="srch" id="srchWrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="srchInput" placeholder="Buscar modelo ou marca..." oninput="render()">
    </div>
    <div class="nav-tabs">
      <button class="nav-tab on" onclick="switchTab('collection')" id="tab-collection">Coleção</button>
      <button class="nav-tab" onclick="switchTab('sales')" id="tab-sales">Vendas</button>
      <button class="nav-tab" onclick="switchTab('wishlist')" id="tab-wishlist">Wishlist</button>
    </div>
  </div>
  <div id="collectionView"></div>
  <div id="salesView" style="display:none"></div>
  <div id="wishlistView" style="display:none"></div>
  <div id="addMount"></div>
  <div id="detMount"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const SVG_PLUS = `<svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const SVG_CAMERA = `<svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>`;
const SVG_BACK = `<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>`;
const SVG_EDIT = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:#111;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
const SVG_TRASH = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

let data = JSON.parse(localStorage.getItem('vault4') || 'null');
if (!data) {
  data = [
    {id:1,brand:'Nike',model:'Air Force 1 Low White',size:'42',paid:'599',sell:'750',notes:'Box perfeita',sold:false,soldDate:'',photo:''},
    {id:2,brand:'Jordan Brand',model:'Air Jordan 1 High OG Chicago',size:'43',paid:'1299',sell:'3200',notes:'Deadstock',sold:true,soldDate:'2025-03-12',photo:''},
    {id:3,brand:'Adidas',model:'Yeezy Boost 350 V2 Zebra',size:'42',paid:'2100',sell:'2800',notes:'',sold:false,soldDate:'',photo:''},
    {id:4,brand:'Nike',model:'Dunk Low Panda',size:'42',paid:'799',sell:'',notes:'Usando agora',sold:false,soldDate:'',photo:''},
    {id:5,brand:'New Balance',model:'990v3 Made in USA Grey',size:'41',paid:'1100',sell:'1400',notes:'',sold:false,soldDate:'',photo:''},
    {id:6,brand:'Jordan Brand',model:'Air Jordan 4 Retro Bred',size:'43',paid:'1899',sell:'4500',notes:'Lançamento',sold:true,soldDate:'2025-11-02',photo:''},
  ];
  save();
}

let activeTab='collection', brandFilter='Todos', chartInst=null, pendingPhoto=null;

let wishlist = JSON.parse(localStorage.getItem('vault_wish') || '[]');
function saveWish(){localStorage.setItem('vault_wish',JSON.stringify(wishlist));}

const emojis={Nike:'👟','Jordan Brand':'🏀',Adidas:'🔱','New Balance':'🔵',Puma:'🐆',Converse:'⭐',Vans:'🛹'};
function ico(b){return emojis[b]||'👟'}
function save(){localStorage.setItem('vault4',JSON.stringify(data))}
function num(v){if(!v)return 0;return parseFloat(String(v).replace(/\D/g,''))||0}
function fmt(v){const n=num(v);if(!n)return null;return 'R$ '+n.toLocaleString('pt-BR')}
function fmtDate(d){if(!d)return '';try{const dt=new Date(d+'T12:00:00');return dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})}catch(e){return d}}

function switchTab(t){
  activeTab=t;
  document.getElementById('tab-collection').classList.toggle('on',t==='collection');
  document.getElementById('tab-sales').classList.toggle('on',t==='sales');
  document.getElementById('tab-wishlist').classList.toggle('on',t==='wishlist');
  document.getElementById('srchWrap').style.display=t==='collection'?'block':'none';
  document.getElementById('collectionView').style.display=t==='collection'?'block':'none';
  document.getElementById('salesView').style.display=t==='sales'?'block':'none';
  document.getElementById('wishlistView').style.display=t==='wishlist'?'block':'none';
  if(t==='sales') renderSales();
  if(t==='wishlist') renderWishlist();
}

function render(){
  const active=data.filter(d=>!d.sold);
  const q=document.getElementById('srchInput').value.toLowerCase();
  const brands=[...new Set(active.map(d=>d.brand))];
  if(!brands.includes(brandFilter)&&brandFilter!=='Todos') brandFilter='Todos';
  const filtered=active.filter(d=>`${d.brand} ${d.model}`.toLowerCase().includes(q)&&(brandFilter==='Todos'||d.brand===brandFilter));
  const totalPaid=active.reduce((s,d)=>s+num(d.paid),0);
  const sold=data.filter(d=>d.sold);
  const realProfit=sold.reduce((s,d)=>s+(num(d.sell)-num(d.paid)),0);
  const profitColor=realProfit>=0?'#4ade80':'#f87171';
  const profitSign=realProfit>=0?'+ ':'- ';
  const pillsHtml=['Todos',...brands].map(p=>`<div class="pill ${p===brandFilter?'on':''}" onclick="setBrand('${p.replace(/'/g,"\\'")}')">${p}</div>`).join('');
  const cardsHtml=filtered.length===0?'<div class="empty">Nenhum tênis encontrado</div>':filtered.map(d=>{
    const paidN=num(d.paid),sellN=num(d.sell),hasSell=d.sell&&d.sell!=='';
    let sc='none',sl='sem preço';
    if(hasSell){sl=fmt(d.sell);sc=sellN>paidN?'profit':sellN<paidN?'loss':'';}
    const img=d.photo?`<img src="${d.photo}" alt="${d.model}">`:`<span style="font-size:48px">${ico(d.brand)}</span>`;
    return `<div class="scard" onclick="showDetail(${d.id})"><div class="scard-img">${img}</div><div class="scard-body"><div class="scard-brand">${d.brand.toUpperCase()}</div><div class="scard-name">${d.model}</div><div class="price-row"><div class="price-paid">${fmt(d.paid)||'—'}</div><div class="price-sell ${sc}">${sl}</div></div></div></div>`;
  }).join('');
  document.getElementById('collectionView').innerHTML=`
    <div class="pills">${pillsHtml}</div>
    <div class="portfolio">
      <div class="pcard"><div class="lbl">PARES</div><div class="val">${active.length}</div></div>
      <div class="pcard"><div class="lbl">INVESTIDO</div><div class="val" style="font-size:15px">R$ ${totalPaid.toLocaleString('pt-BR')}</div></div>
      <div class="pcard"><div class="lbl">VENDIDOS</div><div class="val">${sold.length}</div></div>
      <div class="pcard"><div class="lbl">LUCRO REAL</div><div class="val" style="font-size:15px;color:${profitColor}">${profitSign}R$ ${Math.abs(realProfit).toLocaleString('pt-BR')}</div></div>
    </div>
    <div class="grid">${cardsHtml}</div>`;
}

function setBrand(b){brandFilter=b;render()}

function renderSales(){
  const sold=data.filter(d=>d.sold);
  if(chartInst){chartInst.destroy();chartInst=null;}
  const totalSold=sold.reduce((s,d)=>s+num(d.sell),0);
  const totalCost=sold.reduce((s,d)=>s+num(d.paid),0);
  const totalProfit=totalSold-totalCost;
  const pc=totalProfit>=0?'#4ade80':'#f87171';
  const chartHtml=sold.length>0?`<div class="chart-wrap"><div style="font-size:9px;letter-spacing:2px;color:#666;font-weight:500">LUCRO POR PAR</div><div class="chart-area"><canvas id="profitChart"></canvas></div></div>`:'';
  const listHtml=sold.length===0?'<div class="no-sales">Nenhuma venda registrada ainda.<br>Edite um tênis e marque como vendido.</div>':sold.map(d=>{
    const profit=num(d.sell)-num(d.paid),pct=num(d.paid)>0?((profit/num(d.paid))*100):0;
    const cls=profit>0?'pos':profit<0?'neg':'zero',sign=profit>0?'+ ':'';
    const img=d.photo?`<img src="${d.photo}" alt="${d.model}">`:`${ico(d.brand)}`;
    return `<div class="sale-row" onclick="showDetail(${d.id})"><div class="sale-ico">${img}</div><div class="sale-info"><div class="sale-brand">${d.brand.toUpperCase()}</div><div class="sale-name">${d.model}</div><div class="sale-date">${fmtDate(d.soldDate)}</div></div><div class="sale-right"><div class="sale-profit ${cls}">${sign}R$ ${Math.abs(profit).toLocaleString('pt-BR')}</div><div class="sale-sub">${pct>=0?'+':''}${pct.toFixed(1)}%</div></div></div>`;
  }).join('');
  document.getElementById('salesView').innerHTML=`<div class="sales-section"><div class="portfolio" style="padding-bottom:0"><div class="pcard"><div class="lbl">VENDIDOS</div><div class="val">${sold.length}</div></div><div class="pcard"><div class="lbl">LUCRO TOTAL</div><div class="val" style="font-size:15px;color:${pc}">R$ ${Math.abs(totalProfit).toLocaleString('pt-BR')}</div></div><div class="pcard"><div class="lbl">RECEBIDO</div><div class="val" style="font-size:14px">R$ ${totalSold.toLocaleString('pt-BR')}</div></div><div class="pcard"><div class="lbl">CUSTO TOTAL</div><div class="val" style="font-size:14px">R$ ${totalCost.toLocaleString('pt-BR')}</div></div></div>${chartHtml}<div style="margin-top:14px"><div class="sec-title">HISTÓRICO DE VENDAS</div>${listHtml}</div><div style="height:24px"></div></div>`;
  if(sold.length>0){
    requestAnimationFrame(()=>{
      const canvas=document.getElementById('profitChart');
      if(!canvas)return;
      const labels=sold.map(d=>d.model.length>14?d.model.slice(0,14)+'…':d.model);
      const profits=sold.map(d=>num(d.sell)-num(d.paid));
      chartInst=new Chart(canvas,{type:'bar',data:{labels,datasets:[{data:profits,backgroundColor:profits.map(p=>p>=0?'rgba(74,222,128,0.2)':'rgba(248,113,113,0.2)'),borderColor:profits.map(p=>p>=0?'#4ade80':'#f87171'),borderWidth:1.5,borderRadius:6}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>'R$ '+Math.abs(ctx.raw).toLocaleString('pt-BR')}}},scales:{x:{grid:{display:false},ticks:{font:{size:11},color:'#555'}},y:{grid:{color:'rgba(255,255,255,0.05)'},ticks:{font:{size:11},color:'#555',callback:v=>'R$'+Math.round(v/1000)+'k'}}}}});
    });
  }
}

function showAdd(existing){
  pendingPhoto=existing?(existing.photo||null):null;
  const d=existing||{id:null,brand:'',model:'',size:'',paid:'',sell:'',notes:'',sold:false,soldDate:'',photo:''};
  const isSold=d.sold||false;
  document.getElementById('addMount').innerHTML=`
    <div class="modal-wrap" onclick="closeAdd(event)">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="drag"></div>
        <div class="sh-title">${d.id?'Editar par':'Novo par'}</div>
        <div class="fl">
          <div class="fg">
            <label>FOTO</label>
            <div class="img-picker" id="imgPicker" onclick="document.getElementById('photoFileInput').click()">
              ${pendingPhoto
                ?`<img src="${pendingPhoto}" alt="preview"><div class="img-picker-overlay">${SVG_CAMERA}<span>TROCAR</span></div>`
                :`<div class="img-picker-empty">${SVG_CAMERA}<span>ADICIONAR FOTO</span></div>`}
            </div>
            <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">
          </div>
          <div class="fg"><label>MARCA</label><input id="f-brand" value="${d.brand}" placeholder="Nike, Jordan, Adidas..."></div>
          <div class="fg"><label>MODELO</label><input id="f-model" value="${d.model}" placeholder="Air Jordan 1 High OG..."></div>
          <div class="fr">
            <div class="fg"><label>NÚMERO</label><input id="f-size" value="${d.size}" placeholder="42"></div>
            <div class="fg"><label>VALOR PAGO</label><input id="f-paid" value="${d.paid}" placeholder="R$ 0"></div>
          </div>
          <div class="fg"><label>PREÇO DE VENDA</label><input id="f-sell" value="${d.sell}" placeholder="Deixe vazio se não quiser vender"></div>
          <div class="fg"><label>OBSERVAÇÕES</label><textarea id="f-notes" placeholder="Condição, onde comprou...">${d.notes||''}</textarea></div>
          <div class="divider"></div>
          <div>
            <div style="font-size:9px;letter-spacing:2px;color:#888;font-weight:500;margin-bottom:10px">REGISTRO DE VENDA</div>
            <div class="sold-toggle">
              <div class="toggle-track ${isSold?'on':''}" id="soldTrack" onclick="toggleSold()"><div class="toggle-thumb"></div></div>
              <span class="toggle-lbl" id="soldLbl">${isSold?'Vendido':'Marcar como vendido'}</span>
            </div>
            <div id="soldDateWrap" style="display:${isSold?'block':'none'}">
              <div class="fg"><label>DATA DA VENDA</label><input type="date" id="f-soldDate" value="${d.soldDate||''}"></div>
            </div>
          </div>
          <button class="btn-save" onclick="saveItem(${d.id||'null'})">Salvar</button>
          <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
          ${d.id?`<button class="btn-del" onclick="deleteItem(${d.id})">${SVG_TRASH} Excluir par</button>`:''}
        </div>
      </div>
    </div>`;
}

function handlePhoto(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    pendingPhoto=ev.target.result;
    const picker=document.getElementById('imgPicker');
    if(picker)picker.innerHTML=`<img src="${pendingPhoto}" alt="preview"><div class="img-picker-overlay">${SVG_CAMERA}<span>TROCAR</span></div>`;
  };
  reader.readAsDataURL(file);
}

function toggleSold(){
  const track=document.getElementById('soldTrack');
  const on=track.classList.toggle('on');
  document.getElementById('soldLbl').textContent=on?'Vendido':'Marcar como vendido';
  document.getElementById('soldDateWrap').style.display=on?'block':'none';
}

function closeAdd(e){
  if(!e||e.target.classList.contains('modal-wrap')){document.getElementById('addMount').innerHTML='';pendingPhoto=null;}
}

function saveItem(id){
  const brand=document.getElementById('f-brand').value.trim()||'Outros';
  const model=document.getElementById('f-model').value.trim()||'Sem nome';
  const size=document.getElementById('f-size').value.trim();
  const paid=document.getElementById('f-paid').value.replace(/\D/g,'');
  const sell=document.getElementById('f-sell').value.replace(/\D/g,'');
  const notes=document.getElementById('f-notes').value.trim();
  const sold=document.getElementById('soldTrack').classList.contains('on');
  const soldDate=(document.getElementById('f-soldDate')||{}).value||'';
  const photo=pendingPhoto!==null?pendingPhoto:(id?(data.find(d=>d.id===id)||{}).photo||'':'');
  const obj={brand,model,size,paid,sell,notes,sold,soldDate,photo};
  if(id){Object.assign(data.find(d=>d.id===id),obj);}else{data.push({id:Date.now(),...obj});}
  save();pendingPhoto=null;
  document.getElementById('addMount').innerHTML='';
  document.getElementById('detMount').innerHTML='';
  render();if(activeTab==='sales')renderSales();
}

function deleteItem(id){
  data=data.filter(d=>d.id!=id);save();pendingPhoto=null;
  document.getElementById('addMount').innerHTML='';
  document.getElementById('detMount').innerHTML='';
  render();if(activeTab==='sales')renderSales();
}

function showDetail(id){
  const d=data.find(x=>x.id===id);if(!d)return;
  const paidN=num(d.paid),sellN=num(d.sell),hasSell=d.sell&&d.sell!=='';
  const profit=hasSell?sellN-paidN:null;
  const pct=hasSell&&paidN?((profit/paidN)*100):null;
  const pcls=profit===null?'zero':profit>0?'pos':'neg';
  const sign=profit>0?'+ ':'';
  let svc='muted';if(hasSell){svc=sellN>paidN?'green':sellN<paidN?'red':'';}
  const hero=d.photo?`<img src="${d.photo}" alt="${d.model}">`:`<span style="font-size:80px">${ico(d.brand)}</span>`;
  document.getElementById('detMount').innerHTML=`
    <div class="det-wrap">
      <div class="det-hero">${hero}
        <div class="det-back" onclick="document.getElementById('detMount').innerHTML=''">${SVG_BACK}</div>
        <div class="det-edit" onclick="editFromDet(${d.id})">${SVG_EDIT}</div>
      </div>
      <div class="det-body">
        ${d.sold?'<div class="sold-badge">VENDIDO</div>':''}
        <div class="det-brand">${d.brand.toUpperCase()}</div>
        <div class="det-name">${d.model}</div>
        <div class="det-grid">
          <div class="det-block"><div class="lbl">NÚMERO</div><div class="v">${d.size||'—'}</div></div>
          <div class="det-block"><div class="lbl">VALOR PAGO</div><div class="v">${fmt(d.paid)||'—'}</div></div>
          <div class="det-block"><div class="lbl">PREÇO VENDA</div><div class="v ${svc}">${hasSell?fmt(d.sell):'—'}</div></div>
          <div class="det-block"><div class="lbl">DATA VENDA</div><div class="v muted">${d.sold&&d.soldDate?fmtDate(d.soldDate):'—'}</div></div>
        </div>
        ${hasSell?`<div class="profit-card"><div class="lbl">${d.sold?'LUCRO REAL':'LUCRO SE VENDER'}</div><div class="profit-row"><div class="profit-num ${pcls}">${sign}R$ ${Math.abs(profit).toLocaleString('pt-BR')}</div><div class="profit-pct">${pct!==null?(pct>=0?'+':'')+pct.toFixed(1)+'%':''}</div></div></div>`:''}
        ${d.notes?`<div class="det-notes"><div class="lbl">OBSERVAÇÕES</div><div class="txt">${d.notes}</div></div>`:''}
        <button class="btn-save" onclick="editFromDet(${d.id})">${SVG_EDIT} Editar</button>
        <button class="btn-del" style="margin-top:10px" onclick="deleteItem(${d.id})">${SVG_TRASH} Excluir par</button>
      </div>
    </div>`;
}

/* ===== WISHLIST ===== */
function renderWishlist(){
  const wl=wishlist;
  const cardsHtml=wl.length===0
    ?'<div class="empty" style="grid-column:span 2">Sua wishlist está vazia.<br>Adicione tênis que deseja ter.</div>'
    :wl.map(w=>{
        const retN=num(w.retail),curN=num(w.current),hasCur=w.current&&w.current!=='';
        const diff=hasCur?curN-retN:null;
        const diffFmt=diff===null?null:(diff>=0?'+ ':'- ')+'R$ '+Math.abs(diff).toLocaleString('pt-BR');
        const sc=diff===null?'none':diff>0?'profit':diff<0?'loss':'';
        const leftLabel=hasCur?fmt(w.current):(fmt(w.retail)||'—');
        const img=w.photo?`<img src="${w.photo}" alt="${w.model}">`:`<span style="font-size:48px">${ico(w.brand)}</span>`;
        return `<div class="scard" onclick="showWishDetail(${w.id})">
          <div class="scard-img">${img}</div>
          <div class="scard-body">
            <div class="scard-brand">${w.brand.toUpperCase()}</div>
            <div class="scard-name">${w.model}</div>
            <div class="price-row">
              <div class="price-paid">${leftLabel}</div>
              <div class="price-sell ${sc}">${diff!==null?diffFmt:'sem preço atual'}</div>
            </div>
          </div>
        </div>`;
      }).join('');

  document.getElementById('wishlistView').innerHTML=`
    <div class="portfolio">
      <div class="pcard"><div class="lbl">NA LISTA</div><div class="val">${wl.length}</div></div>
      <div class="pcard"><div class="lbl">RETAIL TOTAL</div><div class="val" style="font-size:14px">R$ ${wl.reduce((s,w)=>s+num(w.retail),0).toLocaleString('pt-BR')}</div></div>
    </div>
    <div class="grid">${cardsHtml}</div>
    <button class="add-btn" onclick="showWishAdd()">
      <svg viewBox="0 0 24 24" style="width:18px;height:18px;stroke:#111;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Adicionar à wishlist
    </button>`;
}

function showWishAdd(existing){
  pendingPhoto=existing?(existing.photo||null):null;
  const w=existing||{id:null,brand:'',model:'',size:'',retail:'',current:'',notes:'',photo:''};
  document.getElementById('addMount').innerHTML=`
    <div class="modal-wrap" onclick="closeAdd(event)">
      <div class="sheet" onclick="event.stopPropagation()">
        <div class="drag"></div>
        <div class="sh-title">${w.id?'Editar wishlist':'Adicionar à wishlist'}</div>
        <div class="fl">
          <div class="fg">
            <label>FOTO</label>
            <div class="img-picker" id="imgPicker" onclick="document.getElementById('photoFileInput').click()">
              ${pendingPhoto
                ?`<img src="${pendingPhoto}" alt="preview"><div class="img-picker-overlay">${SVG_CAMERA}<span>TROCAR</span></div>`
                :`<div class="img-picker-empty">${SVG_CAMERA}<span>ADICIONAR FOTO</span></div>`}
            </div>
            <input type="file" id="photoFileInput" accept="image/*" style="display:none" onchange="handlePhoto(event)">
          </div>
          <div class="fg"><label>MARCA</label><input id="w-brand" value="${w.brand}" placeholder="Nike, Jordan, Adidas..."></div>
          <div class="fg"><label>MODELO</label><input id="w-model" value="${w.model}" placeholder="Air Jordan 1 High OG..."></div>
          <div class="fg"><label>NÚMERO</label><input id="w-size" value="${w.size}" placeholder="42"></div>
          <div class="fr">
            <div class="fg"><label>PREÇO RETAIL</label><input id="w-retail" value="${w.retail}" placeholder="R$ 0"></div>
            <div class="fg"><label>PREÇO ATUAL</label><input id="w-current" value="${w.current}" placeholder="Opcional"></div>
          </div>
          <div class="fg"><label>OBSERVAÇÕES</label><textarea id="w-notes" placeholder="Colorway, onde encontrar...">${w.notes||''}</textarea></div>
          <button class="btn-save" onclick="saveWishItem(${w.id||'null'})">Salvar</button>
          <button class="btn-cancel" onclick="closeAdd()">Cancelar</button>
          ${w.id?`<button class="btn-del" onclick="deleteWishItem(${w.id})">${SVG_TRASH} Remover da wishlist</button>`:''}
        </div>
      </div>
    </div>`;
}

function saveWishItem(id){
  const brand=document.getElementById('w-brand').value.trim()||'Outros';
  const model=document.getElementById('w-model').value.trim()||'Sem nome';
  const size=document.getElementById('w-size').value.trim();
  const retail=document.getElementById('w-retail').value.replace(/\D/g,'');
  const current=document.getElementById('w-current').value.replace(/\D/g,'');
  const notes=document.getElementById('w-notes').value.trim();
  const photo=pendingPhoto!==null?pendingPhoto:(id?(wishlist.find(w=>w.id===id)||{}).photo||'':'');
  const obj={brand,model,size,retail,current,notes,photo};
  if(id){Object.assign(wishlist.find(w=>w.id===id),obj);}
  else{wishlist.push({id:Date.now(),...obj});}
  saveWish();pendingPhoto=null;
  document.getElementById('addMount').innerHTML='';
  document.getElementById('detMount').innerHTML='';
  renderWishlist();
}

function deleteWishItem(id){
  wishlist=wishlist.filter(w=>w.id!=id);
  saveWish();pendingPhoto=null;
  document.getElementById('addMount').innerHTML='';
  document.getElementById('detMount').innerHTML='';
  renderWishlist();
}

function showWishDetail(id){
  const w=wishlist.find(x=>x.id===id);if(!w)return;
  const retN=num(w.retail),curN=num(w.current),hasCur=w.current&&w.current!=='';
  const diff=hasCur?curN-retN:null;
  const pct=hasCur&&retN?((diff/retN)*100):null;
  const cls=diff===null?'zero':diff>0?'pos':'neg';
  const sign=diff!==null&&diff>0?'+ ':'';
  let svc='muted';if(hasCur){svc=curN>retN?'green':curN<retN?'red':'';}
  const hero=w.photo?`<img src="${w.photo}" alt="${w.model}">`:`<span style="font-size:80px">${ico(w.brand)}</span>`;
  document.getElementById('detMount').innerHTML=`
    <div class="det-wrap">
      <div class="det-hero">${hero}
        <div class="det-back" onclick="document.getElementById('detMount').innerHTML=''">${SVG_BACK}</div>
        <div class="det-edit" onclick="editFromWishDet(${w.id})">${SVG_EDIT}</div>
      </div>
      <div class="det-body">
        <div style="font-size:9px;letter-spacing:2px;font-weight:500;padding:3px 8px;border-radius:100px;background:rgba(255,255,255,0.08);color:#aaa;display:inline-block;margin-bottom:6px">WISHLIST</div>
        <div class="det-brand">${w.brand.toUpperCase()}</div>
        <div class="det-name">${w.model}</div>
        <div class="det-grid">
          <div class="det-block"><div class="lbl">NÚMERO</div><div class="v">${w.size||'—'}</div></div>
          <div class="det-block"><div class="lbl">RETAIL</div><div class="v">${fmt(w.retail)||'—'}</div></div>
          <div class="det-block" style="grid-column:span 2"><div class="lbl">PREÇO ATUAL</div><div class="v ${svc}">${hasCur?fmt(w.current):'Não informado'}</div></div>
        </div>
        ${diff!==null?`<div class="profit-card"><div class="lbl">VARIAÇÃO EM RELAÇÃO AO RETAIL</div><div class="profit-row"><div class="profit-num ${cls}">${sign}R$ ${Math.abs(diff).toLocaleString('pt-BR')}</div><div class="profit-pct">${pct!==null?(pct>=0?'+':'')+pct.toFixed(1)+'%':''}</div></div></div>`:''}
        ${w.notes?`<div class="det-notes"><div class="lbl">OBSERVAÇÕES</div><div class="txt">${w.notes}</div></div>`:''}
        <button class="btn-save" onclick="editFromWishDet(${w.id})">${SVG_EDIT} Editar</button>
        <button class="btn-del" style="margin-top:10px" onclick="deleteWishItem(${w.id})">${SVG_TRASH} Remover da wishlist</button>
      </div>
    </div>`;
}

function editFromWishDet(id){
  document.getElementById('detMount').innerHTML='';
  showWishAdd(wishlist.find(x=>x.id===id));
}

function editFromDet(id){document.getElementById('detMount').innerHTML='';showAdd(data.find(x=>x.id===id));}

render();
</script>
